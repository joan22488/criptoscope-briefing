<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#12121a"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="60%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Fondo redondeado -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Anillo exterior -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#ring)" stroke-width="18" opacity="0.25"/>

  <!-- Anillo con corte (scope) -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="url(#ring)" stroke-width="14"
    stroke-dasharray="750 140" stroke-dashoffset="0" stroke-linecap="round"/>

  <!-- Cruz de mira -->
  <line x1="256" y1="96" x2="256" y2="152" stroke="#6366f1" stroke-width="12" stroke-linecap="round" opacity="0.7"/>
  <line x1="256" y1="360" x2="256" y2="416" stroke="#6366f1" stroke-width="12" stroke-linecap="round" opacity="0.7"/>
  <line x1="96" y1="256" x2="152" y2="256" stroke="#6366f1" stroke-width="12" stroke-linecap="round" opacity="0.7"/>
  <line x1="360" y1="256" x2="416" y2="256" stroke="#6366f1" stroke-width="12" stroke-linecap="round" opacity="0.7"/>

  <!-- Línea de precio (trending up) -->
  <polyline
    points="140,310 190,280 230,295 270,240 310,220 372,175"
    fill="none" stroke="url(#line)" stroke-width="16"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Punto central -->
  <circle cx="256" cy="256" r="12" fill="#6366f1"/>
  <circle cx="256" cy="256" r="6" fill="#e2e8f0"/>
</svg>
